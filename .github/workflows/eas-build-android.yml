name: EAS Build Android (APK)

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup EAS CLI
        run: npm install -g eas-cli

      - name: Install dependencies
        working-directory: ./packages/happy-app
        run: |
          npm install --legacy-peer-deps

      - name: Configure EAS project
        run: |
          echo '{"expo":{"slug":"happy","extra":{"eas":{"projectId":"07f70315-2747-4822-8ef4-405eb83d8fc0"}}}}' > app.json

      - name: Build Android APK
        working-directory: ./packages/happy-app
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            PROFILE="production"
          else
            PROFILE="preview"
          fi
          eas build --platform android --profile $PROFILE --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Wait for build and get APK URL
        id: apk-url
        run: |
          # Get the latest build ID
          sleep 5
          BUILD_ID=$(eas build:list --platform=android --limit=1 --non-interactive --json | jq -r '.[0].id')
          echo "Build ID: $BUILD_ID"

          # Wait for build to complete
          for i in {1..60}; do
            STATUS=$(eas build:view $BUILD_ID --json | jq -r '.status')
            echo "[$i] Build status: $STATUS"

            if [ "$STATUS" = "finished" ]; then
              echo "✅ Build finished successfully!"

              # Get APK URL
              APK_URL=$(eas build:view $BUILD_ID --json | jq -r '.artifacts[] | select(.type | contains("apk")) | .url')
              echo "APK URL: $APK_URL"
              echo "url=$APK_URL" >> $GITHUB_OUTPUT
              break
            elif [ "$STATUS" = "errored" ]; then
              echo "❌ Build failed!"
              exit 1
            fi

            echo "Waiting 30 seconds..."
            sleep 30
          done
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Create APK download link
        run: |
          echo "## 📱 APK 下载链接" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "构建完成！APK 下载地址：" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.apk-url.outputs.url }}" >> $GITHUB_STEP_SUMMARY

      - name: Create Release with APK
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          body: "## 📱 APK 下载链接\n\n${{ steps.apk-url.outputs.url }}"
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
