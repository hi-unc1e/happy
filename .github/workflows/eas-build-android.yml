name: EAS Build Android (APK)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  release:
    types: [created]

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: yarn.lock

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Setup EAS CLI
        run: npm install -g eas-cli

      - name: Configure EAS project
        run: |
          cd packages/happy-app
          echo '{"expo":{"slug":"happy","extra":{"eas":{"projectId":"${{ secrets.EXPO_PROJECT_ID }}"}}}}' > ../../app.json

      - name: Login to Expo
        run: eas login --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android APK (Preview)
        if: github.event_name == 'push' || github.event_name == 'pull_request'
        run: |
          cd packages/happy-app
          eas build --platform android --profile preview --non-interactive --output ../build.apk
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android APK (Production)
        if: github.event_name == 'release'
        run: |
          cd packages/happy-app
          eas build --platform android --profile production --non-interactive --output ../build.apk
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build.apk
          retention-days: 30

      - name: Create Release with APK
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: build.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
