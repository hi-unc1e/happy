name: EAS Build Android (APK)

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup EAS CLI
        run: npm install -g eas-cli

      - name: Configure project
        run: |
          echo '{"expo":{"slug":"happy"}}' > app.json

      - name: Build Android APK
        id: build
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            PROFILE="production"
          else
            PROFILE="preview"
          fi
          cd packages/happy-app
          eas build --platform android --profile $PROFILE --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Wait for build and download APK
        run: |
          # Get the latest build ID
          BUILD_ID=$(eas build:list --platform=android --limit=1 --non-interactive --json | jq -r '.[0].id')
          echo "Build ID: $BUILD_ID"

          # Wait for build to complete
          for i in {1..60}; do
            STATUS=$(eas build:view $BUILD_ID --json | jq -r '.status')
            echo "Build status: $STATUS"

            if [ "$STATUS" = "finished" ]; then
              echo "Build finished successfully!"
              # Download the APK
              eas build:view $BUILD_ID --json | jq -r '.artifacts[] | select(.type | contains("apk")) | .url' | xargs -n 1 curl -L -o build.apk
              break
            elif [ "$STATUS" = "errored" ]; then
              echo "Build failed!"
              exit 1
            fi

            echo "Waiting 30 seconds..."
            sleep 30
          done
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build.apk
          retention-days: 30

      - name: Create Release with APK
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: build.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
